services:
  db:
    image: postgres:16
    container_name: drink_lab_api_postgres
    environment:
      POSTGRES_USER: drink_lab_api
      POSTGRES_PASSWORD: password
      POSTGRES_DB: drink_lab_api_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drink_lab_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: drink_lab_api
    command: bin/rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: drink_lab_api
      POSTGRES_PASSWORD: password
      POSTGRES_DB: drink_lab_api_development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: